name: MeetingCountdown
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.4
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
targets:
  FeishuMeetingCountdown:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MeetingCountdownApp
        excludes:
          - "**/AGENTS.md"
          - "Resources/**"
      - path: MeetingCountdownApp/Resources
        buildPhase: resources
    settings:
      base:
        APP_DISPLAY_NAME: Feishu Meeting Countdown
        PRODUCT_NAME: FeishuMeetingCountdown
        PRODUCT_BUNDLE_IDENTIFIER: com.luiszeng.meetingcountdown
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/FeishuMeetingCountdown-Info.plist
        SUPPORTS_MACCATALYST: NO
      configs:
        Debug:
          APP_DISPLAY_NAME: Feishu Meeting Countdown Dev
          PRODUCT_BUNDLE_IDENTIFIER: com.luiszeng.meetingcountdown.dev
    scheme:
      gatherCoverageData: true
      testTargets:
        - FeishuMeetingCountdownTests
  FeishuMeetingCountdownTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MeetingCountdownAppTests
        excludes:
          - "**/AGENTS.md"
    dependencies:
      - target: FeishuMeetingCountdown
