# SwiftLint 配置
# 哲学：warning 只是信号，不阻断构建；error 保留给真正影响代码健康的气味。
# 首次引入时预计会出现一批 warning，安排单独清理任务处理；
# CI 将 warning 作为 review signal，而不是让流水线变红。
# 参考：docs/adrs/2026-04-22-swiftlint-and-pre-commit.md

# 只 lint 这两个目录，避免扫描三方产物或测试辅助代码
included:
  - MeetingCountdownApp
  - MeetingCountdownAppTests

# 不扫描构建产物、Xcode 生成目录、shell 脚本目录、文档目录
excluded:
  - build
  - DerivedData
  - MeetingCountdown.xcodeproj
  - .build
  - scripts
  - docs
  - .planning

# 关闭对开发阶段影响过大、或已有其他手段保证的规则
disabled_rules:
  - trailing_whitespace  # 编辑器格式化负责，不让 lint 重复
  - todo                 # TODO 注释在本项目是有效的开发信号，不强制清除

# 引入有价值但非默认启用的规则
opt_in_rules:
  - force_unwrapping          # 强制解包会导致运行时 crash，至少要 warning
  - force_cast                # 同上
  - implicit_return           # 单行闭包和计算属性可以省 return，保持风格一致
  - redundant_nil_coalescing  # `?? nil` 是冗余写法，直接用 Optional
  - sorted_imports            # import 按字母序，降低合并冲突概率

# 行长度：开发时 140 字符以内为优选，超过 200 才算真正不可接受
line_length:
  warning: 140
  error: 200
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

# 函数体长度：100 行内可接受（AppContainer.makeAppRuntime 是合理装配）；200 行是真气味
function_body_length:
  warning: 120
  error: 250

# 类型体长度：SwiftUI Settings 页 + 状态机类型偏长是这个项目的现状，
# warning 阈值放宽到 800；超过 1500 才是真气味（要拆 page）
type_body_length:
  warning: 800
  error: 1500

# 文件长度：SwiftUI View / 测试文件容易偏长；600 内可接受，>1500 真气味
file_length:
  warning: 700
  error: 1500

# 圈复杂度：超过 12 说明逻辑分支偏多，超过 25 是明确代码气味
cyclomatic_complexity:
  warning: 12
  error: 25

# 标识符名：默认 40 字符上限对 `localizedCalendarHeaderConnectionBadgeText`
# 这种语义清晰但字面长的命名过紧；放宽到 60。`vc` 这种短到无意义的还是要纠正。
identifier_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 60
    error: 80

# 类型名：默认 40 对 `SelectableSoundProfileReminderAudioEngine` 这种描述性
# 命名过紧；放宽到 60。
type_name:
  max_length:
    warning: 60
    error: 80

# 函数参数个数：6 个偶有出现（如 settings page metadata builder），
# 7 才作 warning，10 才是 error
function_parameter_count:
  warning: 7
  error: 10

# 对 force_unwrapping / force_cast 只警告，不阻断（error 留给真正危险的场景）
force_unwrapping: warning
force_cast: warning
