name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ github.token }}
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate Release Secrets
        run: |
          set -euo pipefail

          missing=0
          for name in \
            MACOS_CERTIFICATE_P12_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            MACOS_SIGNING_IDENTITY \
            MACOS_KEYCHAIN_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "当前 Release workflow 默认要求稳定代码签名身份；请先配置签名相关 secrets。" >&2
            exit 1
          fi

      - name: Install XcodeGen
        run: |
          set -euo pipefail

          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Regenerate Xcode Project
        run: |
          set -euo pipefail
          xcodegen generate

      - name: Import Signing Certificate
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/release-signing-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          output_path = Path(os.environ["RUNNER_TEMP"]) / "release-signing-certificate.p12"
          output_path.write_bytes(base64.b64decode(os.environ["MACOS_CERTIFICATE_P12_BASE64"]))
          PY

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$MACOS_KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Create Or Update Release
        run: |
          set -euo pipefail
          ./scripts/release-gh.sh \
            --tag "$GITHUB_REF_NAME" \
            --signing-identity "$MACOS_SIGNING_IDENTITY"

      - name: Cleanup Temporary Keychain
        if: always()
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"
          if [[ -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
